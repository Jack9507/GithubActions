name: CI/CD to build, push and deploy
on:
  push:
    branches:
      - master

jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Code
          uses: actions/checkout@v5

        - name: Build Docker Image
          run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/githubactions:${{github.run_number}} .

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        
        - name: Push Image to Docker Hub
          run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/githubactions:${{github.run_number}}

    
    
