name: CI/CD to build, push and deploy
on:
  push:
    branches:
      - master

jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Code
          uses: actions/checkout@v5

        - name: Build Docker Image
          run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/githubactions:${{github.run_number}} .

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        
        - name: Push Image to Docker Hub
          run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/githubactions:${{github.run_number}}

    
    
    deploy:
      runs-on: ubuntu-latest
      needs: build

      steps:
        - name: Pull Image from Docker Hub
          run: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/githubactions:${{github.run_number}}

        - name: Run Container 
          run: |
            docker run -itd -p 8080:8080 --name Game_Node_App ${{ secrets.DOCKER_USERNAME }}/githubactions:${{github.run_number}}

        - name: Wait for server
          run: sleep 5

        - name: Curl health endpoint
          run: curl -v http://localhost:8080/health

  
